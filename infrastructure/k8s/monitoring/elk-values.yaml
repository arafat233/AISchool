# ELK Stack via Elastic Helm charts
# Elasticsearch + Logstash + Kibana — centralised log aggregation, 2-year retention

elasticsearch:
  replicas: 3
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  volumeClaimTemplate:
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        storage: 100Gi
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: true
      xpack.monitoring.collection.enabled: true
      # Index lifecycle management — 2-year retention
      indices.lifecycle.poll_interval: 1h

logstash:
  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      xpack.monitoring.enabled: true
  logstashPipeline:
    logstash.conf: |
      input {
        beats { port => 5044 }
        tcp { port => 5000 codec => json }
      }
      filter {
        if [service] {
          mutate { add_field => { "[@metadata][index_prefix]" => "school-erp-%{[service]}" } }
        }
        date { match => ["timestamp", "ISO8601"] target => "@timestamp" }
      }
      output {
        elasticsearch {
          hosts => ["elasticsearch-master:9200"]
          index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
          ilm_enabled => true
          ilm_rollover_alias => "school-erp-logs"
          ilm_pattern => "{now/d}-000001"
          ilm_policy => "school-erp-2yr-retention"
        }
      }

kibana:
  elasticsearchHosts: "http://elasticsearch-master:9200"
  ingress:
    enabled: true
    hosts:
      - kibana.schoolerp.app
