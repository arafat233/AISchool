worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20M;

  # ─── Rate limiting ──────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ─── Upstream pools ─────────────────────────────────────────────────────
  upstream api_gateway {
    server api-gateway:3000;
  }

  upstream admin_portal {
    server admin-portal:3100;
  }

  upstream teacher_portal {
    server teacher-portal:3101;
  }

  upstream student_portal {
    server student-portal:3102;
  }

  upstream parent_portal {
    server parent-portal:3103;
  }

  # ─── API Gateway ────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.schoolerp.local localhost;

    location /health {
      access_log off;
      return 200 "OK\n";
    }

    location /auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }
  }

  # ─── Admin Portal ───────────────────────────────────────────────────────
  server {
    listen 80;
    server_name admin.schoolerp.local;

    location / {
      proxy_pass http://admin_portal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # ─── Teacher Portal ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name teacher.schoolerp.local;

    location / {
      proxy_pass http://teacher_portal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # ─── Student Portal ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name student.schoolerp.local;

    location / {
      proxy_pass http://student_portal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # ─── Parent Portal ──────────────────────────────────────────────────────
  server {
    listen 80;
    server_name parent.schoolerp.local;

    location / {
      proxy_pass http://parent_portal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
