  expense-service:
    build:
      context: .
      dockerfile: apps/expense-service/Dockerfile
    container_name: erp_expense
    <<: *service-defaults
    ports:
      - "3018:3018"
    environment:
      PORT: 3018
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
      EXPENSE_SERVICE_PORT: 3018
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  event-service:
    build:
      context: .
      dockerfile: apps/event-service/Dockerfile
    container_name: erp_event
    <<: *service-defaults
    ports:
      - "3017:3017"
    environment:
      PORT: 3017
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
      EVENT_SERVICE_PORT: 3017
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND PORTALS
  # ═══════════════════════════════════════════════════════════════════════════

  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
    container_name: erp_admin_portal
    <<: *service-defaults
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NEXT_PUBLIC_API_URL: http://localhost:3001

  teacher-portal:
    build:
      context: .
      dockerfile: apps/teacher-portal/Dockerfile
    container_name: erp_teacher_portal
    <<: *service-defaults
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      NEXT_PUBLIC_API_URL: http://localhost:3001

  student-portal:
    build:
      context: .
      dockerfile: apps/student-portal/Dockerfile
    container_name: erp_student_portal
    <<: *service-defaults
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      NEXT_PUBLIC_API_URL: http://localhost:3001

  parent-portal:
    build:
      context: .
      dockerfile: apps/parent-portal/Dockerfile
    container_name: erp_parent_portal
    <<: *service-defaults
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      NEXT_PUBLIC_API_URL: http://localhost:3001

networks:
  erp_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
