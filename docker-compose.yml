  transport-service:
    build:
      context: .
      dockerfile: apps/transport-service/Dockerfile
    container_name: erp_transport
    <<: *service-defaults
    ports:
      - "3014:3014"
    environment:
      PORT: 3014
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
      TRANSPORT_SERVICE_PORT: 3014
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started

  health-service:
    build:
      context: .
      dockerfile: apps/health-service/Dockerfile
    container_name: erp_health
    <<: *service-defaults
    ports:
      - "3015:3015"
    environment:
