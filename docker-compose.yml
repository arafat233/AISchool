version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - erp_net
  env_file:
    - .env

x-backend-healthcheck: &backend-healthcheck
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    <<: *service-defaults
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_erp}
      POSTGRES_USER: ${POSTGRES_USER:-school_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_change_in_production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    <<: *service-defaults
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: erp_mqtt
    <<: *service-defaults
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  influxdb:
    image: influxdb:2.7-alpine
    container_name: erp_influxdb
    <<: *service-defaults
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: school-erp
      DOCKER_INFLUXDB_INIT_BUCKET: gps_logs
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # DB migrations (runs once then exits)
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/migrate.Dockerfile
    container_name: erp_migrate
    <<: *service-defaults
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    restart: "no"

  # ═══════════════════════════════════════════════════════════════════════════
  # BACKEND MICROSERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: erp_auth
    <<: *service-defaults
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: erp_user
    <<: *service-defaults
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  student-service:
    build:
      context: .
      dockerfile: apps/student-service/Dockerfile
    container_name: erp_student
    <<: *service-defaults
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  academic-service:
    build:
      context: .
      dockerfile: apps/academic-service/Dockerfile
    container_name: erp_academic
    <<: *service-defaults
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  attendance-service:
    build:
      context: .
      dockerfile: apps/attendance-service/Dockerfile
    container_name: erp_attendance
    <<: *service-defaults
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  fee-service:
    build:
      context: .
      dockerfile: apps/fee-service/Dockerfile
    container_name: erp_fee
    <<: *service-defaults
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: erp_notification
    <<: *service-defaults
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  exam-service:
    build:
      context: .
      dockerfile: apps/exam-service/Dockerfile
    container_name: erp_exam
    <<: *service-defaults
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  lms-service:
    build:
      context: .
      dockerfile: apps/lms-service/Dockerfile
    container_name: erp_lms
    <<: *service-defaults
    ports:
      - "3009:3009"
    environment:
      PORT: 3009
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  hr-service:
    build:
      context: .
      dockerfile: apps/hr-service/Dockerfile
    container_name: erp_hr
    <<: *service-defaults
    ports:
      - "3010:3010"
    environment:
      PORT: 3010
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  payroll-service:
    build:
      context: .
      dockerfile: apps/payroll-service/Dockerfile
    container_name: erp_payroll
    <<: *service-defaults
    ports:
      - "3011:3011"
    environment:
      PORT: 3011
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  certificate-service:
    build:
      context: .
      dockerfile: apps/certificate-service/Dockerfile
    container_name: erp_certificate
    <<: *service-defaults
    ports:
      - "3012:3012"
    environment:
      PORT: 3012
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
      CERTIFICATE_SERVICE_PORT: 3012
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admission-service:
    build:
      context: .
      dockerfile: apps/admission-service/Dockerfile
    container_name: erp_admission
    <<: *service-defaults
    ports:
      - "3013:3013"
    environment:
      PORT: 3013
      DATABASE_URL: postgresql://${POSTGRES_USER:-school_erp}:${POSTGRES_PASSWORD:-secret_change_in_production}@postgres:5432/${POSTGRES_DB:-school_erp}
