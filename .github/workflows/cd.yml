name: CD

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.33.0"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/school-erp

jobs:
  # ─── Determine changed services ─────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'apps/auth-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'
            api-gateway:
              - 'apps/api-gateway/**'
              - 'packages/**'

  # ─── Build & push Docker images ─────────────────────────────────────────
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.changes.outputs.auth-service }}
          - service: user-service
            changed: ${{ needs.changes.outputs.user-service }}
          - service: api-gateway
            changed: ${{ needs.changes.outputs.api-gateway }}
    if: matrix.changed == 'true'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}

  # ─── Deploy (placeholder — wire to your infra) ──────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Trigger deployment
        run: |
          echo "Deploy step — wire this to kubectl/Helm/Fly.io/Railway/etc."
          echo "Images pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-*"
